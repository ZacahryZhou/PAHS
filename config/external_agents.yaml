# Register local agents/tools PAHS can delegate to.
# PAHS 是主控；下面是「工具型」子项目。

external_agents:
  smas:
    enabled: true
    type: smas
    description: SMAS — generate Instagram post content and preview image
    project_dir: ~/Desktop/SMAS
    subcommand: message
    timeout_seconds: 900
    match_keywords:
      - smas
      - instagram
      - ins post
      - ig post
      - 发帖
      - 图文
    match_prefixes:
      - "@smas"
      - "smas:"

  pip:
    enabled: true
    type: pip
    description: PIP — generate short video from text prompt
    project_dir: ~/Desktop/PIP
    mock: false
    skip_approval: true
    timeout_seconds: 3600
    match_keywords:
      - pip
      - 短视频
      - 生成视频
      - promo video
    match_prefixes:
      - "@pip"
      - "pip:"

  openclaw:
    enabled: false
    type: openclaw
    description: OpenClaw local agent (optional; disable if using SMAS/PIP only)
    binary: openclaw
    default_agent: main
    use_local: true
    use_json: true
    timeout_seconds: 600
    match_keywords:
      - openclaw
      - open claw
      - 用openclaw
      - 调用openclaw
    match_prefixes:
      - "@openclaw"
      - "openclaw:"
