<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PAHS Dev Lab</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --surface: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --accent: #18181b;
      --accent-soft: #f4f4f5;
      --done: #18181b;
      --active-ring: #3b82f6;
      --fail: #dc2626;
      --ok: #16a34a;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "SF Pro Text", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      z-index: 10;
    }
    header h1 { margin: 0; font-size: 1.05rem; font-weight: 650; letter-spacing: -0.02em; }
    .header-meta { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; }
    .run-id { font-family: ui-monospace, monospace; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text);
      font-weight: 600;
      font-size: 0.72rem;
    }
    .status-pill.ok { background: #dcfce7; color: var(--ok); }
    .status-pill.err { background: #fee2e2; color: var(--fail); }
    .status-pill.run { background: #dbeafe; color: #1d4ed8; }

    .workspace {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }
    .chat-panel {
      flex: 0 0 48%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      min-height: 0;
    }
    .resizer {
      width: 5px;
      cursor: col-resize;
      background: var(--border);
      flex-shrink: 0;
      transition: background .15s;
      position: relative;
    }
    .resizer:hover, .resizer.dragging { background: #a1a1aa; }
    .resizer::after { content: ""; position: absolute; inset: 0 -4px; }

    .graph-stack {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .resizer-h {
      height: 5px;
      cursor: row-resize;
      background: var(--border);
      flex-shrink: 0;
      transition: background .15s;
      position: relative;
    }
    .resizer-h:hover, .resizer-h.dragging { background: #a1a1aa; }
    .resizer-h::after { content: ""; position: absolute; inset: -4px 0; }

    .graph-panel {
      flex: 1;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--bg);
    }
    .panel-head {
      padding: 10px 16px;
      font-size: 0.7rem;
      font-weight: 650;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-head span.hint { font-weight: 500; text-transform: none; letter-spacing: 0; font-size: 0.72rem; }

    #error-banner {
      display: none;
      margin: 10px 14px 0;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid #fecaca;
      background: #fef2f2;
      color: var(--fail);
      font-size: 0.8rem;
      white-space: pre-wrap;
    }
    #error-banner.visible { display: block; }

    #messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 92%;
      padding: 11px 14px;
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      border-radius: 12px;
    }
    .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: var(--accent-soft); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; color: var(--muted); font-size: 0.78rem; background: transparent; padding: 4px; }
    .msg.error { align-self: stretch; border: 1px solid #fecaca; color: var(--fail); background: #fef2f2; }

    .composer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: var(--surface);
    }
    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font: inherit;
      resize: vertical;
      background: var(--bg);
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus { outline: none; border-color: #a1a1aa; box-shadow: 0 0 0 3px rgba(24,24,27,.06); }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      transition: opacity .15s;
    }
    button:hover { opacity: .88; }
    button:disabled { opacity: .35; cursor: not-allowed; }
    button.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    .review-box {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      border-top: 1px solid var(--border);
    }
    .review-box.visible { display: flex; }
    .review-preview {
      flex: 1;
      min-height: 0;
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      overflow-y: auto;
      white-space: pre-wrap;
      background: #fafafa;
    }
    .cap-warn {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 0.82rem;
      line-height: 1.5;
      white-space: normal;
    }
    .review-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .review-meta .pill {
      font-size: 0.68rem;
      font-family: ui-monospace, monospace;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .review-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .review-foot {
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .chat-panel.review-mode #messages { display: none; }
    .chat-panel.review-mode .review-box { flex: 1; min-height: 0; }

    .path-legend {
      display: flex;
      gap: 12px;
      padding: 8px 16px;
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .path-legend .on { color: var(--text); font-weight: 650; }

    #graph-wrap {
      flex: 1;
      min-height: 100px;
      overflow: auto;
      padding: 12px;
      background: linear-gradient(180deg, #fafafa 0%, var(--bg) 100%);
    }
    #arch-svg { width: 100%; min-width: 380px; height: auto; display: block; }

    #node-detail {
      flex: 0 0 32%;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      box-shadow: 0 -4px 16px rgba(0,0,0,.04);
    }
    #node-detail.empty .detail-body { color: var(--muted); }
    .detail-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .detail-head h3 { margin: 0; font-size: 0.88rem; font-weight: 650; }
    .detail-head .badge {
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--muted);
      font-weight: 600;
    }
    .detail-head .expand-btn {
      font-size: 0.68rem;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--accent-soft);
      border: 1px solid var(--border);
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
    }
    .detail-head .expand-btn:hover { background: #e4e4e7; }
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--muted);
      font-weight: 600;
    }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .task-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--bg);
    }
    .task-card .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .task-card .tag {
      font-size: 0.68rem;
      font-weight: 650;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
    }
    .task-card .tag.tool { background: #e4e4e7; color: var(--text); }
    .task-card .goal { color: var(--text); margin-top: 4px; }

    .event-row {
      border-left: 3px solid var(--border);
      padding: 6px 0 6px 10px;
      margin-bottom: 10px;
    }
    .event-row .time { font-family: ui-monospace, monospace; font-size: 0.68rem; color: var(--muted); }
    .event-row .sum { margin: 2px 0; font-weight: 500; }
    .event-row pre {
      margin: 6px 0 0;
      padding: 8px;
      background: var(--bg);
      border-radius: 6px;
      font-size: 0.68rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
    }
    .event-row pre.expanded { max-height: none; }
    .event-row.err { border-left-color: var(--fail); }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(2px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      max-width: 720px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }
    .modal header h2 { margin: 0; font-size: 1rem; font-weight: 650; }
    .modal-close {
      background: var(--accent-soft);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
    }
    .modal-close:hover { background: #e4e4e7; }
    .modal-body {
      padding: 16px 18px;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.55;
    }

    /* SVG nodes */
    .g-node rect { stroke: #d4d4d8; stroke-width: 1.5; fill: #fff; transition: all .18s ease; }
    .g-node.idle rect { fill: #f4f4f5; stroke: #e4e4e7; opacity: .5; }
    .g-node.pending rect { fill: #fff; }
    .g-node.active rect { fill: #fff; stroke: var(--active-ring); stroke-width: 2.5; filter: drop-shadow(0 0 4px rgba(59,130,246,.35)); }
    .g-node.done rect { fill: var(--done); stroke: var(--done); }
    .g-node.done text { fill: #fff !important; }
    .g-node.done .sub { fill: #d4d4d8 !important; }
    .g-node.waiting rect { fill: #fff; stroke: var(--accent); stroke-dasharray: 5 3; }
    .g-node.failed rect { fill: #fef2f2; stroke: var(--fail); stroke-width: 2.5; }
    .g-node.selected rect { stroke: var(--active-ring); stroke-width: 3; }
    .g-node { cursor: pointer; }
    .g-node:hover rect { stroke: #71717a; }
    .g-edge { stroke: #d4d4d8; stroke-width: 1.2; fill: none; }
    .g-edge.path-b { stroke: #e4e4e7; stroke-dasharray: 5 3; }
    .g-edge.active { stroke: var(--accent); stroke-width: 1.8; }
  </style>
</head>
<body>
  <header>
    <h1>PAHS Dev Lab</h1>
    <div class="header-meta">
      <span class="run-id" id="run-label">idle</span>
      <span class="status-pill" id="status-label">ready</span>
    </div>
  </header>

  <div class="workspace" id="workspace">
    <section class="chat-panel" id="chat-panel">
      <div class="panel-head">对话</div>
      <div id="error-banner"></div>
      <div id="messages"></div>
      <div class="review-box" id="review-box">
        <div class="panel-head" style="border-top:1px solid var(--border)">里程碑产出</div>
        <div class="review-preview" id="review-preview"></div>
        <div class="composer">
          <textarea id="review-input" placeholder="修改意见，或直接点通过"></textarea>
          <button type="button" class="secondary" id="approve-btn">通过</button>
          <button type="button" class="secondary" id="reply-btn">提交</button>
        </div>
      </div>
      <div class="composer" id="main-composer">
        <textarea id="input" placeholder="输入测试命令，例如：帮我搜索咖啡热点"></textarea>
        <button type="button" id="send-btn">发送</button>
      </div>
    </section>

    <div class="resizer" id="resizer" title="拖动调整宽度"></div>

    <section class="graph-panel" id="graph-panel">
      <div class="panel-head">
        架构流程
        <span class="hint">点击节点打开详情弹窗</span>
      </div>
      <div class="path-legend">
        <span class="on">Path A · LangGraph</span>
        <span>Path B · Telegram 直达</span>
      </div>
      <div class="graph-stack" id="graph-stack">
        <div id="graph-wrap">
          <svg id="arch-svg" viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="resizer-h" id="resizer-h" title="拖动调整上下高度"></div>
        <div id="node-detail" class="empty">
          <div class="detail-head">
            <h3 id="detail-title">节点详情</h3>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="badge" id="detail-badge">—</span>
              <button type="button" class="expand-btn" id="detail-expand" style="display:none">弹窗查看</button>
            </div>
          </div>
          <div class="detail-body" id="detail-body">点击架构图中的任意节点，查看该步骤的任务与事件日志。</div>
        </div>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <header>
        <h2 id="modal-title">节点详情</h2>
        <button type="button" class="modal-close" id="modal-close" aria-label="关闭">×</button>
      </header>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    const svg = document.getElementById("arch-svg");
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const runLabel = document.getElementById("run-label");
    const statusLabel = document.getElementById("status-label");
    const reviewBox = document.getElementById("review-box");
    const reviewPreview = document.getElementById("review-preview");
    const reviewInput = document.getElementById("review-input");
    const mainComposer = document.getElementById("main-composer");
    const errorBanner = document.getElementById("error-banner");
    const chatPanel = document.getElementById("chat-panel");
    const detailPanel = document.getElementById("node-detail");
    const detailTitle = document.getElementById("detail-title");
    const detailBadge = document.getElementById("detail-badge");
    const detailBody = document.getElementById("detail-body");
    const resizer = document.getElementById("resizer");
    const resizerH = document.getElementById("resizer-h");
    const graphWrap = document.getElementById("graph-wrap");
    const graphStack = document.getElementById("graph-stack");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modal-title");
    const modalBody = document.getElementById("modal-body");
    const detailExpand = document.getElementById("detail-expand");

    let currentRunId = null;
    let eventSource = null;
    let pollTimer = null;
    let lastProgress = null;
    let lastShownError = "";
    let selectedNodeId = null;
    let hDragging = false;

    /* —— horizontal resizer (left/right) —— */
    let dragging = false;
    resizer.addEventListener("mousedown", (e) => {
      dragging = true;
      resizer.classList.add("dragging");
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
      e.preventDefault();
    });
    document.addEventListener("mousemove", (e) => {
      if (dragging) {
        const ws = document.getElementById("workspace");
        const rect = ws.getBoundingClientRect();
        const pct = ((e.clientX - rect.left) / rect.width) * 100;
        chatPanel.style.flex = `0 0 ${Math.min(72, Math.max(28, pct))}%`;
      }
      if (hDragging) {
        const rect = graphStack.getBoundingClientRect();
        const pct = ((e.clientY - rect.top) / rect.height) * 100;
        graphWrap.style.flex = `0 0 ${Math.min(78, Math.max(22, pct))}%`;
        detailPanel.style.flex = "1";
      }
    });
    document.addEventListener("mouseup", () => {
      if (dragging) {
        dragging = false;
        resizer.classList.remove("dragging");
      }
      if (hDragging) {
        hDragging = false;
        resizerH.classList.remove("dragging");
      }
      if (!dragging && !hDragging) {
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      }
    });

    resizerH.addEventListener("mousedown", (e) => {
      hDragging = true;
      resizerH.classList.add("dragging");
      document.body.style.cursor = "row-resize";
      document.body.style.userSelect = "none";
      e.preventDefault();
    });

    document.getElementById("modal-close").onclick = () => modal.classList.remove("open");
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("open"); };
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") modal.classList.remove("open");
    });
    detailExpand.onclick = () => { if (selectedNodeId) openNodeModal(selectedNodeId); };

    function isArchQuery(t) {
      return /^(目前)?架构$|^architecture$|^流程$/i.test(t.trim());
    }

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(status) {
      const map = {
        AWAITING_REVIEW: ["等待审核", "ok"],
        AWAITING_FINAL_FEEDBACK: ["等待反馈", "ok"],
        COMPLETED: ["已完成", "ok"],
        FAILED: ["失败", "err"],
        ACTIVE: ["运行中", "run"],
        STARTING: ["启动中", "run"],
      };
      const [text, cls] = map[status] || [status || "ready", ""];
      statusLabel.textContent = text;
      statusLabel.className = "status-pill" + (cls ? " " + cls : "");
    }

    function showRunError(err) {
      if (!err) {
        errorBanner.classList.remove("visible");
        errorBanner.textContent = "";
        return;
      }
      errorBanner.classList.add("visible");
      errorBanner.textContent = err;
      if (err !== lastShownError) {
        lastShownError = err;
        addMessage("error", err);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function getExecutionPlan() {
      const snap = lastProgress && lastProgress.snapshot && lastProgress.snapshot.execution_plan;
      const hasTasks = snap && (snap.phases || []).some((p) => (p.tasks || []).length);
      if (hasTasks) return snap;
      const evs = ((lastProgress && lastProgress.node_details) || {}).orchestrator_plan || [];
      const created = evs.find((e) => e.event_type === "orchestrator_plan_created");
      if (created && created.payload && created.payload.execution_plan) {
        return created.payload.execution_plan;
      }
      return snap;
    }

    function capabilityWarning(command) {
      if (!command) return "";
      if (!/开通|注册|账号|开户|视频号|bilibili|youtube|tiktok|instagram|管理.{0,4}(账号|号)|平台账号/i.test(command)) {
        return "";
      }
      return "⚠️ 能力边界：当前 PAHS 无法代你开通或管理真实平台账号（无浏览器自动化 / 平台 API 工具）。"
        + "已批准工具：search_web、generate_content、run_python、SMAS/PIP 内容生产。"
        + "Creator 只能提供方案与文案，不能执行开户操作。";
    }

    function formatPresentation(raw) {
      if (!raw) return "<p style='color:var(--muted)'>(无产出)</p>";
      const lines = raw.split("\n");
      const meta = [];
      const body = [];
      for (const line of lines) {
        if (line.startsWith("## ")) continue;
        if (line.startsWith("Reply with") || line.startsWith("回复 ")) continue;
        if (/^(Run|Worker|Mode|Model|Est\.|Milestone|Complexity|Plan):/.test(line)) {
          meta.push(line.replace(/`/g, ""));
        } else if (line.trim()) {
          body.push(line);
        }
      }
      let html = "";
      if (meta.length) {
        html += `<div class="review-meta">${meta.map((m) => `<span class="pill">${escapeHtml(m)}</span>`).join("")}</div>`;
      }
      html += `<div class="review-output">${escapeHtml(body.join("\n").trim() || raw)}</div>`;
      html += `<div class="review-foot">满意请点「通过」，需要修改请在下方输入意见后提交。</div>`;
      return html;
    }

    function formatPlanCards(plan) {
      if (!plan) return "<p style='color:var(--muted)'>暂无任务表</p>";
      let html = `<p style="margin:0 0 8px;color:var(--muted)">${escapeHtml(plan.intent_summary || "")}</p>`;
      html += `<p style="margin:0 0 10px;font-size:0.72rem">复杂度 ${escapeHtml(plan.complexity_band || "?")} · ${escapeHtml(plan.orchestrator_profile || "?")} · 来源 ${escapeHtml(plan.source || "?")}</p>`;
      const phases = plan.phases || [];
      if (!phases.length) {
        html += `<p style="color:var(--muted)">任务表 phases 为空</p>`;
        return html;
      }
      let taskCount = 0;
      phases.forEach((ph) => {
        html += `<div style="font-weight:650;margin:8px 0 4px">${escapeHtml(ph.title || ph.id)}${ph.parallel ? " ⚡并行" : ""}</div>`;
        (ph.tasks || []).forEach((t) => {
          taskCount += 1;
          html += `<div class="task-card">
            <div class="row"><span class="tag">${escapeHtml(t.worker)}</span><span class="tag tool">${escapeHtml(t.tool || "—")}</span><span style="font-size:0.68rem;color:var(--muted)">${escapeHtml(t.id)}</span></div>
            <div class="goal">${escapeHtml(t.goal)}</div>
          </div>`;
        });
      });
      if (!taskCount) {
        html += `<p style="color:var(--muted)">该计划尚未分解为具体 task（仅有意图摘要）</p>`;
      }
      return html;
    }

    function tasksForWorker(plan, worker) {
      if (!plan) return [];
      const out = [];
      (plan.phases || []).forEach((ph) => {
        (ph.tasks || []).forEach((t) => {
          if (t.worker === worker) out.push({ phase: ph, task: t });
        });
      });
      return out;
    }

    function buildNodeDetailHtml(nodeId, full) {
      if (!lastProgress) return "";
      const node = (lastProgress.nodes || []).find((n) => n.id === nodeId);
      const events = (lastProgress.node_details || {})[nodeId] || [];
      const plan = getExecutionPlan();
      let html = "";

      if (node) {
        html += `<p style="margin:0 0 10px;font-size:0.75rem;color:var(--muted)">状态: <strong>${escapeHtml(node.status)}</strong> · 层级: ${escapeHtml(node.sublabel || node.id)}</p>`;
      }

      if (nodeId === "orchestrator_plan" && plan) {
        html += `<div style="font-weight:650;margin-bottom:8px">📋 任务表 ExecutionPlan</div>`;
        html += formatPlanCards(plan);
      } else if (nodeId.startsWith("worker_")) {
        const worker = nodeId.replace("worker_", "");
        const tasks = tasksForWorker(plan, worker);
        html += `<div style="font-weight:650;margin-bottom:8px">Worker: ${escapeHtml(worker)}</div>`;
        if (tasks.length) {
          tasks.forEach(({ phase, task }) => {
            html += `<div class="task-card">
              <div class="row"><span class="tag tool">${escapeHtml(task.tool || "—")}</span><span style="font-size:0.68rem;color:var(--muted)">${escapeHtml(phase.id)}</span></div>
              <div class="goal">${escapeHtml(task.goal)}</div>
              ${task.external_agent ? `<div style="font-size:0.72rem;margin-top:4px;color:var(--muted)">external: ${escapeHtml(task.external_agent)}</div>` : ""}
            </div>`;
          });
        } else {
          html += `<p style="color:var(--muted)">当前任务表未分配 <strong>${escapeHtml(worker)}</strong> 任务。<br>本次运行可能走了其他 Worker 分支。</p>`;
        }
      } else if (nodeId === "triage_score") {
        const capEv = events.find((e) => e.event_type === "capability_assessed");
        if (capEv && capEv.payload) {
          const gaps = capEv.payload.gaps || [];
          html += `<div class="task-card"><div class="goal"><strong>能力检查</strong><br>`;
          html += gaps.length
            ? gaps.map((g) => escapeHtml(g.message || "")).join("<br>")
            : "当前请求在已批准工具范围内";
          html += `</div></div>`;
        }
        const ev = events.find((e) => e.event_type === "triage_routing");
        if (ev && ev.payload) {
          const rc = ev.payload.routing_context || ev.payload;
          html += `<div class="task-card">
            <div class="row"><span class="tag">${escapeHtml(rc.worker || ev.payload.worker || "?")}</span></div>
            <div class="goal">任务类型: ${escapeHtml(rc.task_type || ev.payload.task_type || "?")}<br>复杂度: ${escapeHtml(rc.complexity_band || "?")}<br>需要调研: ${rc.needs_research ? "是" : "否"}</div>
          </div>`;
        }
      } else if (nodeId === "execute_plan_phase") {
        events.filter((e) => e.event_type === "plan_phase_executed").forEach((e) => {
          html += `<div class="task-card"><div class="goal">Phase <strong>${escapeHtml(e.payload.phase_id || "")}</strong><br>workers: ${escapeHtml((e.payload.workers || []).join(", "))}<br>tasks: ${escapeHtml((e.payload.task_ids || []).join(", "))}</div></div>`;
        });
      } else if (nodeId === "verify_pipeline") {
        events.filter((e) => e.event_type.includes("validation")).forEach((e) => {
          html += `<div class="task-card"><div class="goal">${escapeHtml(e.summary || e.event_type)}</div></div>`;
        });
      }

      if (events.length) {
        html += `<div style="font-weight:650;margin:12px 0 6px;font-size:0.75rem">事件日志 (${events.length})</div>`;
        events.forEach((e) => {
          const err = e.event_type.includes("failed");
          html += `<div class="event-row${err ? " err" : ""}">
            <div class="time">${escapeHtml((e.created_at || "").replace("T"," ").slice(0,19))} · ${escapeHtml(e.event_type)}</div>
            <div class="sum">${escapeHtml(e.summary || "")}</div>
            ${e.payload && Object.keys(e.payload).length ? `<pre class="${full ? "expanded" : ""}">${escapeHtml(JSON.stringify(e.payload, null, 2))}</pre>` : ""}
          </div>`;
        });
      } else if (!html) {
        html = `<p style="color:var(--muted)">该节点尚未执行或无事件记录。<br>发送命令开始运行后可查看详情。</p>`;
      }
      return html;
    }

    function openNodeModal(nodeId) {
      selectedNodeId = nodeId;
      const node = lastProgress && (lastProgress.nodes || []).find((n) => n.id === nodeId);
      modalTitle.textContent = node ? `${node.label} · ${node.sublabel || ""}` : nodeId;
      modalBody.innerHTML = buildNodeDetailHtml(nodeId, true);
      modal.classList.add("open");
      renderGraph(lastProgress);
    }

    function renderNodeDetail(nodeId, openModal) {
      selectedNodeId = nodeId;
      if (!lastProgress) return;

      const node = (lastProgress.nodes || []).find((n) => n.id === nodeId);
      detailPanel.classList.remove("empty");
      detailTitle.textContent = node ? node.label : nodeId;
      detailBadge.textContent = (node && node.sublabel) ? node.sublabel : (node ? node.status : "—");
      detailBody.innerHTML = buildNodeDetailHtml(nodeId, false);
      detailExpand.style.display = "inline-block";
      renderGraph(lastProgress);
      if (openModal) openNodeModal(nodeId);
    }

    function applyProgress(data) {
      lastProgress = data;
      renderGraph(data);
      const err = data.run_error || (data.snapshot && data.snapshot.error);
      showRunError(err || null);
      if (data.snapshot) {
        runLabel.textContent = data.snapshot.run_id || currentRunId || "idle";
        setStatus(data.snapshot.status || data.run_status);
        setReviewMode(data.snapshot);
        if (selectedNodeId) renderNodeDetail(selectedNodeId, false);
        else if (data.snapshot.execution_plan && data.snapshot.execution_plan.phases) {
          renderNodeDetail("orchestrator_plan", false);
        }
        if (data.snapshot.status === "FAILED") sendBtn.disabled = false;
      }
    }

    function nodeCenter(n) { return { x: n.x + n.w / 2, y: n.y + n.h / 2 }; }

    function renderGraph(data) {
      if (!data || !data.nodes) return;
      const edges = data.edges || data.graph?.edges || [];
      const nodeMap = {};
      data.nodes.forEach((n) => { nodeMap[n.id] = n; });
      const doneSet = new Set(data.nodes.filter((n) => n.status === "done").map((n) => n.id));
      const activeId = data.active_node;

      let svgHtml = '<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a1a1aa"/></marker></defs>';

      edges.forEach((e) => {
        const a = nodeMap[e.from], b = nodeMap[e.to];
        if (!a || !b) return;
        const ca = nodeCenter(a), cb = nodeCenter(b);
        const lit = doneSet.has(e.from) && (doneSet.has(e.to) || b.id === activeId) ? " active" : "";
        svgHtml += `<line class="g-edge${e.path === "B" ? " path-b" : ""}${lit}" x1="${ca.x}" y1="${ca.y + a.h/2}" x2="${cb.x}" y2="${cb.y - b.h/2}" marker-end="url(#arrow)"/>`;
      });

      data.nodes.forEach((n) => {
        let st = n.status || "pending";
        if (n.id === selectedNodeId) st += " selected";
        const cx = n.x + n.w / 2;
        const tf = n.status === "done" ? "#fff" : "#18181b";
        const sf = n.status === "done" ? "#d4d4d8" : "#71717a";
        svgHtml += `<g class="g-node ${st}" data-id="${n.id}" role="button" tabindex="0">`;
        svgHtml += `<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="6"/>`;
        svgHtml += `<text x="${cx}" y="${n.y + 15}" text-anchor="middle" font-size="10" font-weight="600" fill="${tf}">${n.label}</text>`;
        svgHtml += `<text class="sub" x="${cx}" y="${n.y + 27}" text-anchor="middle" font-size="8" fill="${sf}">${n.sublabel || ""}</text>`;
        if (n.status === "failed") svgHtml += `<text x="${n.x + n.w - 5}" y="${n.y + 12}" text-anchor="end" font-size="9" fill="#dc2626">!</text>`;
        svgHtml += "</g>";
      });

      svg.innerHTML = svgHtml;
      svg.querySelectorAll(".g-node").forEach((g) => {
        const id = g.getAttribute("data-id");
        g.onclick = () => renderNodeDetail(id, true);
        g.onkeydown = (e) => { if (e.key === "Enter") renderNodeDetail(id, true); };
      });
    }

    async function loadArchitecture() {
      const res = await fetch("/api/architecture");
      applyProgress(await res.json());
    }

    function setReviewMode(snap) {
      if (snap && snap.waiting_review) {
        reviewBox.classList.add("visible");
        mainComposer.style.display = "none";
        const warn = capabilityWarning(snap.command || "");
        reviewPreview.innerHTML =
          (warn ? `<div class="cap-warn">${escapeHtml(warn)}</div>` : "") +
          formatPresentation(snap.interrupt_message || "");
        chatPanel.classList.add("review-mode");
      } else {
        reviewBox.classList.remove("visible");
        mainComposer.style.display = "flex";
        chatPanel.classList.remove("review-mode");
      }
    }

    function startPolling(runId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        const res = await fetch("/api/runs/" + runId + "/progress");
        applyProgress(await res.json());
        const st = lastProgress && lastProgress.snapshot && lastProgress.snapshot.status;
        if (["COMPLETED", "FAILED", "BLOCKED"].includes(st)) {
          clearInterval(pollTimer);
          sendBtn.disabled = false;
        }
      }, 400);
    }

    function connectStream(runId) {
      if (eventSource) eventSource.close();
      lastShownError = "";
      startPolling(runId);
      eventSource = new EventSource("/api/runs/" + runId + "/events/stream");
      eventSource.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.done) { eventSource.close(); sendBtn.disabled = false; return; }
        if (data.progress) applyProgress({ ...data.progress, snapshot: data.snapshot });
        else if (data.snapshot) applyProgress({ ...lastProgress, snapshot: data.snapshot });
      };
    }

    async function sendChat() {
      const text = inputEl.value.trim();
      if (!text) return;
      if (isArchQuery(text)) {
        addMessage("user", text);
        addMessage("assistant", "右侧为 LangGraph 流程图。\n· 点击节点 → 弹窗查看完整详情\n· 拖动中间竖条调整左右宽度\n· 拖动架构图下方横条调整上下高度");
        inputEl.value = "";
        loadArchitecture();
        return;
      }
      sendBtn.disabled = true;
      addMessage("user", text);
      inputEl.value = "";
      selectedNodeId = null;
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      currentRunId = data.run_id;
      runLabel.textContent = currentRunId;
      addMessage("system", "运行已开始");
      connectStream(currentRunId);
    }

    document.getElementById("send-btn").onclick = sendChat;
    inputEl.onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); } };
    document.getElementById("approve-btn").onclick = () => {
      fetch("/api/runs/" + currentRunId + "/reply", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: "approved" }),
      }).then(() => connectStream(currentRunId));
    };
    document.getElementById("reply-btn").onclick = () => {
      const t = reviewInput.value.trim();
      if (t) fetch("/api/runs/" + currentRunId + "/reply", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: t }),
      }).then(() => connectStream(currentRunId));
    };

    loadArchitecture().catch((e) => addMessage("error", "初始化失败: " + e.message));
    addMessage("system", "拖动竖条调左右 · 拖动横条调上下 · 点击节点打开详情弹窗");
  </script>
</body>
</html>
