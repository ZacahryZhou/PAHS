<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PAHS Dev Lab</title>
  <style>
    :root {
      --bg: #fff;
      --border: #ccc;
      --text: #000;
      --muted: #666;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    header h1 { margin: 0; font-size: 1rem; font-weight: 600; }
    header .meta { font-family: monospace; font-size: 0.75rem; color: var(--muted); }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }
    .chat-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-height: 0;
    }
    .graph-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #fafafa;
    }
    .panel-title {
      padding: 8px 12px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 90%;
      padding: 8px 12px;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      border-radius: 4px;
    }
    .msg.user { align-self: flex-end; background: #000; color: #fff; }
    .msg.assistant { align-self: flex-start; border: 1px solid var(--border); }
    .msg.system { align-self: center; color: var(--muted); font-size: 0.75rem; }
    .composer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    textarea {
      flex: 1;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px;
      font: inherit;
      resize: vertical;
    }
    button {
      background: #000;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 3px;
      cursor: pointer;
      font: inherit;
    }
    button:disabled { opacity: 0.35; }
    button.secondary { background: #fff; color: #000; border: 1px solid #000; }
    #graph-wrap {
      flex: 1;
      overflow: auto;
      padding: 8px;
    }
    #arch-svg {
      width: 100%;
      min-width: 400px;
      height: auto;
      display: block;
    }
    .path-legend {
      display: flex;
      gap: 16px;
      padding: 6px 12px;
      font-size: 0.7rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .path-legend span.active { color: #000; font-weight: 600; }
    #timeline {
      max-height: 100px;
      overflow-y: auto;
      padding: 6px 12px;
      font-size: 0.65rem;
      font-family: monospace;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: #fff;
    }
    .review-box { display: none; padding: 8px 12px 0; }
    .review-box.visible { display: block; }
    .review-preview {
      border: 1px dashed var(--border);
      padding: 8px;
      font-size: 0.8rem;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-bottom: 8px;
    }
    /* SVG node styles via classes */
    .g-node rect { stroke: #999; stroke-width: 1; fill: #fff; transition: all 0.2s; }
    .g-node.idle rect { fill: #f5f5f5; stroke: #ddd; opacity: 0.55; }
    .g-node.pending rect { fill: #fff; stroke: #bbb; }
    .g-node.active rect { fill: #fff; stroke: #000; stroke-width: 2.5; }
    .g-node.done rect { fill: #000; stroke: #000; }
    .g-node.done text { fill: #fff !important; }
    .g-node.done .sub { fill: #ccc !important; }
    .g-node.waiting rect { fill: #fff; stroke: #000; stroke-dasharray: 4 2; }
    .g-node.failed rect { fill: #fff; stroke: #c00; stroke-width: 2.5; }
    .g-node { cursor: pointer; }
    .g-edge { stroke: #bbb; stroke-width: 1; fill: none; }
    .g-edge.path-b { stroke: #ddd; stroke-dasharray: 5 3; }
    .g-edge.active { stroke: #000; stroke-width: 1.5; }
    .msg.error { align-self: stretch; border: 1px solid #c00; color: #900; background: #fff5f5; font-size: 0.8rem; }
    #error-banner {
      display: none;
      margin: 0 12px 8px;
      padding: 8px 10px;
      border: 1px solid #c00;
      background: #fff5f5;
      color: #900;
      font-size: 0.75rem;
      white-space: pre-wrap;
      max-height: 120px;
      overflow-y: auto;
    }
    #error-banner.visible { display: block; }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border: 1px solid #000;
      max-width: 640px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .modal header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal header h2 { margin: 0; font-size: 0.95rem; }
    .modal-close { background: none; border: none; color: #000; font-size: 1.2rem; padding: 0 4px; }
    .modal-body {
      padding: 12px 14px;
      overflow-y: auto;
      font-size: 0.8rem;
    }
    .event-card {
      border: 1px solid var(--border);
      margin-bottom: 8px;
      padding: 8px;
    }
    .event-card .meta { font-family: monospace; font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    .event-card pre {
      margin: 4px 0 0;
      padding: 6px;
      background: #f5f5f5;
      font-size: 0.68rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .timeline-row { cursor: pointer; padding: 1px 0; }
    .timeline-row:hover { color: #000; text-decoration: underline; }
    .timeline-row.err { color: #c00; }
  </style>
</head>
<body>
  <header>
    <h1>PAHS Dev Lab</h1>
    <div class="meta"><span id="run-label">idle</span> · <span id="status-label">ready</span></div>
  </header>
  <main>
    <section class="chat-panel">
      <div class="panel-title">Chat</div>
      <div id="error-banner"></div>
      <div id="messages"></div>
      <div class="review-box" id="review-box">
        <div class="review-preview" id="review-preview"></div>
        <div class="composer">
          <textarea id="review-input" placeholder="修改意见"></textarea>
          <button type="button" class="secondary" id="approve-btn">通过</button>
          <button type="button" class="secondary" id="reply-btn">提交</button>
        </div>
      </div>
      <div class="composer" id="main-composer">
        <textarea id="input" placeholder="测试命令；输入「架构」查看说明"></textarea>
        <button type="button" id="send-btn">发送</button>
      </div>
    </section>
    <section class="graph-panel">
      <div class="panel-title">Global Architecture</div>
      <div class="path-legend">
        <span id="leg-a" class="active">Path A — LangGraph 完整团队</span>
        <span id="leg-b">Path B — Telegram 直达 SMAS/PIP</span>
      </div>
      <div id="graph-wrap">
        <svg id="arch-svg" viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div id="timeline">事件时间线 · 点击节点或事件查看详情</div>
    </section>
  </main>
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <header>
        <h2 id="modal-title">节点详情</h2>
        <button type="button" class="modal-close" id="modal-close">×</button>
      </header>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
  <script>
    const svg = document.getElementById("arch-svg");
    const messagesEl = document.getElementById("messages");
    const timelineEl = document.getElementById("timeline");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const runLabel = document.getElementById("run-label");
    const statusLabel = document.getElementById("status-label");
    const reviewBox = document.getElementById("review-box");
    const reviewPreview = document.getElementById("review-preview");
    const reviewInput = document.getElementById("review-input");
    const mainComposer = document.getElementById("main-composer");
    const errorBanner = document.getElementById("error-banner");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modal-title");
    const modalBody = document.getElementById("modal-body");

    let currentRunId = null;
    let eventSource = null;
    let pollTimer = null;
    let graphMeta = { nodes: [], edges: [] };
    let lastProgress = null;
    let lastShownError = "";

    function isArchQuery(t) {
      return /^(目前)?架构$|^architecture$|^流程$/i.test(t.trim());
    }

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showRunError(err) {
      if (!err) {
        errorBanner.classList.remove("visible");
        errorBanner.textContent = "";
        return;
      }
      errorBanner.classList.add("visible");
      errorBanner.textContent = "运行失败：\n" + err;
      if (err !== lastShownError) {
        lastShownError = err;
        addMessage("error", "❌ " + err);
      }
    }

    function openNodeModal(nodeId) {
      if (!lastProgress) return;
      const node = (lastProgress.nodes || []).find((n) => n.id === nodeId);
      const events = (lastProgress.node_details || {})[nodeId] || [];
      modalTitle.textContent = node
        ? `${node.label} (${node.sublabel || node.id})`
        : nodeId;
      if (!events.length) {
        modalBody.innerHTML = "<p>该节点暂无事件记录。运行命令后点击已执行的节点查看详情。</p>";
      } else {
        modalBody.innerHTML = events.map((e) => {
          const t = (e.created_at || "").replace("T", " ").slice(0, 19);
          const payload = JSON.stringify(e.payload || {}, null, 2);
          return `<div class="event-card">
            <div class="meta">${t} · ${e.event_type}</div>
            <div>${e.summary || ""}</div>
            <pre>${payload}</pre>
          </div>`;
        }).join("");
      }
      modal.classList.add("open");
    }

    function openEventModal(entry) {
      modalTitle.textContent = entry.node_id || entry.event_type || "事件详情";
      modalBody.innerHTML = `<div class="event-card">
        <div class="meta">${(entry.created_at || "").replace("T", " ").slice(0, 19)} · ${entry.event_type}</div>
        <div>${entry.summary || ""}</div>
        <pre>${JSON.stringify(entry.payload || {}, null, 2)}</pre>
      </div>`;
      modal.classList.add("open");
    }

    document.getElementById("modal-close").onclick = () => modal.classList.remove("open");
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove("open"); };

    function applyProgress(data) {
      lastProgress = data;
      renderGraph(data);
      renderTimeline(data);
      const err = data.run_error || (data.snapshot && data.snapshot.error);
      showRunError(err || null);
      if (data.snapshot) {
        runLabel.textContent = data.snapshot.run_id || currentRunId || "idle";
        statusLabel.textContent = data.snapshot.status || data.run_status || "ready";
        setReviewMode(data.snapshot);
        if (data.snapshot.status === "FAILED" && data.snapshot.error) {
          sendBtn.disabled = false;
        }
      }
    }

    function nodeCenter(n) {
      return { x: n.x + n.w / 2, y: n.y + n.h / 2 };
    }

    function renderGraph(data) {
      if (!data || !data.nodes) return;
      graphMeta.nodes = data.nodes;
      graphMeta.edges = data.edges || data.graph?.edges || [];
      const nodeMap = {};
      data.nodes.forEach((n) => { nodeMap[n.id] = n; });

      const doneSet = new Set(data.nodes.filter((n) => n.status === "done").map((n) => n.id));
      const activeId = data.active_node;

      let svgHtml = '<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#999"/></marker></defs>';

      graphMeta.edges.forEach((e) => {
        const a = nodeMap[e.from];
        const b = nodeMap[e.to];
        if (!a || !b) return;
        const ca = nodeCenter(a);
        const cb = nodeCenter(b);
        const onPath = e.path === "B" ? "path-b" : "";
        const lit = doneSet.has(e.from) && (doneSet.has(e.to) || b.id === activeId) ? " active" : "";
        svgHtml += `<line class="g-edge ${onPath}${lit}" x1="${ca.x}" y1="${ca.y + a.h/2}" x2="${cb.x}" y2="${cb.y - b.h/2}" marker-end="url(#arrow)"/>`;
      });

      data.nodes.forEach((n) => {
        const st = n.status || "pending";
        const cx = n.x + n.w / 2;
        const textFill = st === "done" ? "#fff" : "#000";
        const subFill = st === "done" ? "#ccc" : "#666";
        svgHtml += `<g class="g-node ${st}" data-id="${n.id}">`;
        svgHtml += `<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="3"/>`;
        svgHtml += `<text x="${cx}" y="${n.y + 14}" text-anchor="middle" font-size="10" font-weight="600" fill="${textFill}">${n.label}</text>`;
        svgHtml += `<text class="sub" x="${cx}" y="${n.y + 26}" text-anchor="middle" font-size="8" fill="${subFill}">${n.sublabel || ""}</text>`;
        if (st === "active") {
          svgHtml += `<text x="${n.x + n.w - 4}" y="${n.y + 10}" text-anchor="end" font-size="7" fill="#000">●</text>`;
        }
        if (st === "failed") {
          svgHtml += `<text x="${n.x + n.w - 4}" y="${n.y + 10}" text-anchor="end" font-size="8" fill="#c00">!</text>`;
        }
        svgHtml += "</g>";
      });

      svgHtml += `<text x="120" y="88" font-size="9" fill="#999" text-anchor="middle">Path B</text>`;
      svgHtml += `<text x="400" y="88" font-size="9" fill="#000" text-anchor="middle" font-weight="600">Path A</text>`;

      svg.innerHTML = svgHtml;
      svg.querySelectorAll(".g-node").forEach((g) => {
        g.onclick = () => openNodeModal(g.getAttribute("data-id"));
      });

      if (activeId && nodeMap[activeId]) {
        const n = nodeMap[activeId];
        document.getElementById("graph-wrap").scrollTo({
          top: Math.max(0, n.y - 80), behavior: "smooth"
        });
      }
    }

    function renderTimeline(data) {
      const tl = data.timeline || [];
      if (!tl.length) {
        timelineEl.textContent = "运行后此处显示事件流 · 点击节点或事件查看详情";
        return;
      }
      timelineEl.innerHTML = tl.slice(-12).map((e, i) => {
        const err = e.event_type === "devlab_run_failed" || e.event_type === "validation_failed";
        const idx = tl.length - tl.slice(-12).length + i;
        return `<div class="timeline-row${err ? " err" : ""}" data-idx="${idx}">${(e.created_at || "").slice(11, 19)} [${e.node_id || "-"}] ${e.summary}</div>`;
      }).join("");
      timelineEl.querySelectorAll(".timeline-row").forEach((row) => {
        row.onclick = () => openEventModal(tl[Number(row.dataset.idx)]);
      });
    }

    async function loadArchitecture() {
      const res = await fetch("/api/architecture");
      const data = await res.json();
      applyProgress(data);
    }

    function setReviewMode(snap) {
      if (snap && snap.waiting_review) {
        reviewBox.classList.add("visible");
        mainComposer.style.display = "none";
        reviewPreview.textContent = snap.interrupt_message || "";
        statusLabel.textContent = snap.status;
      } else {
        reviewBox.classList.remove("visible");
        mainComposer.style.display = "flex";
      }
    }

    function startPolling(runId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        const res = await fetch("/api/runs/" + runId + "/progress");
        const data = await res.json();
        applyProgress(data);
        if (data.snapshot && ["COMPLETED", "FAILED", "BLOCKED"].includes(data.snapshot.status)) {
          clearInterval(pollTimer);
          sendBtn.disabled = false;
        }
      }, 400);
    }

    function connectStream(runId) {
      if (eventSource) eventSource.close();
      lastShownError = "";
      startPolling(runId);
      eventSource = new EventSource("/api/runs/" + runId + "/events/stream");
      eventSource.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.done) { eventSource.close(); sendBtn.disabled = false; return; }
        if (data.progress) applyProgress({ ...data.progress, snapshot: data.snapshot });
        else if (data.snapshot) applyProgress({ snapshot: data.snapshot });
      };
    }

    async function sendChat() {
      const text = inputEl.value.trim();
      if (!text) return;
      if (isArchQuery(text)) {
        addMessage("user", text);
        addMessage("assistant", "右侧为全局架构图：\n· Path A（中）Dev Lab / pah run 走完整 LangGraph\n· Path B（左）Telegram IG/视频 直达 SMAS/PIP\n· Execute Phase 下分岔到 Searcher/Creator/Executor/External\n运行命令后节点会实时变黑高亮。");
        inputEl.value = "";
        loadArchitecture();
        return;
      }
      sendBtn.disabled = true;
      addMessage("user", text);
      inputEl.value = "";
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      currentRunId = data.run_id;
      runLabel.textContent = currentRunId;
      addMessage("system", "Run: " + currentRunId);
      connectStream(currentRunId);
    }

    document.getElementById("send-btn").onclick = sendChat;
    inputEl.onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); } };
    document.getElementById("approve-btn").onclick = () => {
      fetch("/api/runs/" + currentRunId + "/reply", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: "approved" }),
      }).then(() => connectStream(currentRunId));
    };
    document.getElementById("reply-btn").onclick = () => {
      const t = reviewInput.value.trim();
      if (t) fetch("/api/runs/" + currentRunId + "/reply", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: t }),
      }).then(() => connectStream(currentRunId));
    };

    loadArchitecture();
    addMessage("system", "右侧 = 全局架构图。点击任意节点查看该步详细事件与 payload；出错会红框标出并显示完整错误。");
  </script>
</body>
</html>
