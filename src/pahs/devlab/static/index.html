<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PAHS Dev Lab</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --green: #22c55e;
      --amber: #f59e0b;
      --pink: #ec4899;
      --red: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header .meta { font-size: 0.8rem; color: var(--muted); }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      min-height: 0;
    }
    .chat-panel, .progress-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .chat-panel { border-right: 1px solid var(--border); }
    .panel-title {
      padding: 10px 16px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 4px;
    }
    .composer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    textarea {
      flex: 1;
      min-width: 200px;
      min-height: 44px;
      max-height: 120px;
      resize: vertical;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.approve { background: var(--green); }
    #progress-nodes {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .node {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 0.82rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .node .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
      background: var(--muted);
    }
    .node.pending .dot { background: #475569; }
    .node.active .dot { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
    .node.done .dot { background: var(--green); }
    .node.waiting .dot { background: var(--pink); box-shadow: 0 0 8px var(--pink); }
    .node.failed .dot { background: var(--red); }
    .node.active { border-color: var(--amber); background: #1c1910; }
    .node.waiting { border-color: var(--pink); background: #1c1018; }
    .node-label { font-weight: 500; }
    .node-sub { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
    #timeline {
      max-height: 160px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 0.72rem;
      color: var(--muted);
    }
    #timeline div { padding: 2px 0; }
    .review-box {
      width: 100%;
      padding: 8px 16px 0;
      display: none;
    }
    .review-box.visible { display: block; }
    .review-preview {
      background: var(--bg);
      border: 1px solid var(--pink);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.8rem;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>PAHS Dev Lab</h1>
    <div class="meta">
      <span id="run-label">no active run</span>
      · <span id="status-label">idle</span>
    </div>
  </header>
  <main>
    <section class="chat-panel">
      <div class="panel-title">Chat · 开发测试对话</div>
      <div id="messages"></div>
      <div class="review-box" id="review-box">
        <div class="review-preview" id="review-preview"></div>
        <div class="composer">
          <textarea id="review-input" placeholder="修改意见，或点通过"></textarea>
          <button type="button" class="approve" id="approve-btn">通过</button>
          <button type="button" class="secondary" id="reply-btn">提交修改</button>
        </div>
      </div>
      <div class="composer" id="main-composer">
        <textarea id="input" placeholder="输入命令，例如：调研 LangGraph 并写中文摘要"></textarea>
        <button type="button" id="send-btn">发送</button>
      </div>
    </section>
    <section class="progress-panel">
      <div class="panel-title">Architecture · 实时进度</div>
      <div id="progress-nodes"></div>
      <div id="timeline"></div>
    </section>
  </main>
  <script>
    const messagesEl = document.getElementById("messages");
    const progressNodesEl = document.getElementById("progress-nodes");
    const timelineEl = document.getElementById("timeline");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const runLabel = document.getElementById("run-label");
    const statusLabel = document.getElementById("status-label");
    const reviewBox = document.getElementById("review-box");
    const reviewPreview = document.getElementById("review-preview");
    const reviewInput = document.getElementById("review-input");
    const approveBtn = document.getElementById("approve-btn");
    const replyBtn = document.getElementById("reply-btn");
    const mainComposer = document.getElementById("main-composer");

    let currentRunId = null;
    let eventSource = null;
    let nodeTemplate = [];

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderNodes(progress) {
      if (!progress || !progress.nodes) return;
      if (nodeTemplate.length === 0) nodeTemplate = progress.nodes;
      progressNodesEl.innerHTML = "";
      progress.nodes.forEach((node) => {
        const el = document.createElement("div");
        el.className = `node ${node.status}`;
        el.innerHTML = `
          <div class="dot" style="background:${node.status === "pending" ? "#475569" : node.color}"></div>
          <div>
            <div class="node-label">${node.label_zh || node.label}</div>
            <div class="node-sub">${node.layer} · ${node.status}</div>
          </div>`;
        progressNodesEl.appendChild(el);
      });
    }

    function renderTimeline(progress) {
      if (!progress || !progress.timeline) return;
      timelineEl.innerHTML = progress.timeline.slice(-12).map((item) =>
        `<div>${item.created_at || ""} · ${item.summary || item.event_type}</div>`
      ).join("");
    }

    function setReviewMode(snapshot) {
      const waiting = snapshot && snapshot.waiting_review;
      if (waiting) {
        reviewBox.classList.add("visible");
        mainComposer.style.display = "none";
        reviewPreview.textContent = snapshot.interrupt_message || "(等待审核)";
        statusLabel.textContent = snapshot.review_type || "AWAITING_REVIEW";
      } else {
        reviewBox.classList.remove("visible");
        mainComposer.style.display = "flex";
      }
    }

    function connectStream(runId) {
      if (eventSource) eventSource.close();
      eventSource = new EventSource(`/api/runs/${runId}/events/stream`);
      eventSource.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.done) {
          eventSource.close();
          sendBtn.disabled = false;
          return;
        }
        if (data.progress) {
          renderNodes(data.progress);
          renderTimeline(data.progress);
        }
        if (data.snapshot) {
          runLabel.textContent = data.snapshot.run_id;
          statusLabel.textContent = data.snapshot.status;
          setReviewMode(data.snapshot);
          if (data.snapshot.waiting_review && data.snapshot.interrupt_message) {
            const last = messagesEl.lastElementChild;
            if (!last || !last.dataset.review) {
              addMessage("assistant", data.snapshot.interrupt_message);
              messagesEl.lastElementChild.dataset.review = "1";
            }
          }
        }
        (data.events || []).forEach((event) => {
          if (event.event_type === "devlab_run_completed") {
            addMessage("system", "Run completed.");
          }
          if (event.event_type === "devlab_run_failed") {
            addMessage("system", "Run failed: " + (event.payload?.error || "unknown"));
          }
        });
      };
      eventSource.onerror = () => {
        eventSource.close();
        sendBtn.disabled = false;
      };
    }

    async function sendChat() {
      const text = inputEl.value.trim();
      if (!text) return;
      sendBtn.disabled = true;
      addMessage("user", text);
      inputEl.value = "";

      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      currentRunId = data.run_id;
      runLabel.textContent = currentRunId;
      statusLabel.textContent = data.status;
      addMessage("system", `Run started: ${currentRunId}`);
      connectStream(currentRunId);
    }

    async function sendReply(message) {
      if (!currentRunId) return;
      sendBtn.disabled = true;
      approveBtn.disabled = true;
      replyBtn.disabled = true;
      addMessage("user", message);
      await fetch(`/api/runs/${currentRunId}/reply`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      messagesEl.querySelectorAll("[data-review]").forEach((el) => el.removeAttribute("data-review"));
      connectStream(currentRunId);
      approveBtn.disabled = false;
      replyBtn.disabled = false;
    }

    sendBtn.addEventListener("click", sendChat);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });
    approveBtn.addEventListener("click", () => sendReply("approved"));
    replyBtn.addEventListener("click", () => {
      const text = reviewInput.value.trim();
      if (text) sendReply(text);
    });

    fetch("/api/runs/__bootstrap__/progress").catch(() => {
      renderNodes({
        nodes: [
          { id: "ingest", label_zh: "接收任务", layer: "gateway", status: "pending", color: "#64748b" },
          { id: "triage_score", label_zh: "① Triage", layer: "routing", status: "pending", color: "#f59e0b" },
          { id: "orchestrator_plan", label_zh: "🎯 Orchestrator", layer: "orchestrator", status: "pending", color: "#3b82f6" },
          { id: "execute_plan_phase", label_zh: "执行 Phase", layer: "execution", status: "pending", color: "#22c55e" },
          { id: "milestone_review", label_zh: "⏸ 审核", layer: "human", status: "pending", color: "#ec4899" },
        ],
        timeline: [],
      });
    });
  </script>
</body>
</html>
