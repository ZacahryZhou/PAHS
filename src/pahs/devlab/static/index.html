<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PAHS Dev Lab</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #fafafa;
      --border: #d4d4d4;
      --text: #0a0a0a;
      --muted: #737373;
      --active-bg: #f5f5f5;
      --waiting-bg: #ebebeb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
    header .meta { font-size: 0.78rem; color: var(--muted); font-family: ui-monospace, monospace; }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 400px;
      min-height: 0;
    }
    .chat-panel, .progress-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .chat-panel { border-right: 1px solid var(--border); }
    .panel-title {
      padding: 10px 16px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 6px;
      line-height: 1.55;
      font-size: 0.88rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #0a0a0a;
      color: #fff;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .msg.system {
      align-self: center;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 2px;
    }
    .composer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--panel);
    }
    textarea {
      flex: 1;
      min-width: 200px;
      min-height: 44px;
      max-height: 120px;
      resize: vertical;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }
    textarea:focus { outline: 2px solid #0a0a0a; outline-offset: 0; }
    button {
      background: #0a0a0a;
      color: #fff;
      border: 1px solid #0a0a0a;
      border-radius: 4px;
      padding: 10px 16px;
      font: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: #fff;
      color: #0a0a0a;
    }
    #progress-nodes {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .node {
      display: grid;
      grid-template-columns: 14px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 0.8rem;
    }
    .node .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid #a3a3a3;
      background: #fff;
    }
    .node.pending .dot { background: #fff; }
    .node.active { background: var(--active-bg); border-color: #0a0a0a; border-width: 2px; }
    .node.active .dot { background: #0a0a0a; border-color: #0a0a0a; }
    .node.done .dot { background: #0a0a0a; border-color: #0a0a0a; }
    .node.waiting { background: var(--waiting-bg); border-style: dashed; }
    .node.waiting .dot { background: #737373; }
    .node.failed { border-color: #0a0a0a; opacity: 0.5; text-decoration: line-through; }
    .node-label { font-weight: 500; }
    .node-layer {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .node-status {
      font-size: 0.68rem;
      color: var(--muted);
      font-family: ui-monospace, monospace;
      text-transform: uppercase;
    }
  .arch-hint {
      padding: 8px 12px;
      font-size: 0.72rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }
    #timeline {
      max-height: 140px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 0.7rem;
      color: var(--muted);
      font-family: ui-monospace, monospace;
      background: var(--panel);
    }
    #timeline div { padding: 2px 0; border-bottom: 1px solid #eee; }
    .review-box { width: 100%; padding: 8px 16px 0; display: none; }
    .review-box.visible { display: block; }
    .review-preview {
      background: #fff;
      border: 1px dashed var(--border);
      padding: 10px;
      font-size: 0.8rem;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <header>
    <h1>PAHS Dev Lab</h1>
    <div class="meta">
      <span id="run-label">idle</span> · <span id="status-label">ready</span>
    </div>
  </header>
  <main>
    <section class="chat-panel">
      <div class="panel-title">Chat</div>
      <div id="messages"></div>
      <div class="review-box" id="review-box">
        <div class="review-preview" id="review-preview"></div>
        <div class="composer">
          <textarea id="review-input" placeholder="修改意见，或点通过"></textarea>
          <button type="button" class="secondary" id="approve-btn">通过</button>
          <button type="button" class="secondary" id="reply-btn">提交修改</button>
        </div>
      </div>
      <div class="composer" id="main-composer">
        <textarea id="input" placeholder="发命令测试；输入「架构」只查看右侧流程图"></textarea>
        <button type="button" id="send-btn">发送</button>
      </div>
    </section>
    <section class="progress-panel">
      <div class="panel-title">Architecture · Path A</div>
      <div class="arch-hint">打开页面即显示完整 LangGraph 流水线。发送命令后节点会实时高亮。</div>
      <div id="progress-nodes"></div>
      <div id="timeline"></div>
    </section>
  </main>
  <script>
    const messagesEl = document.getElementById("messages");
    const progressNodesEl = document.getElementById("progress-nodes");
    const timelineEl = document.getElementById("timeline");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const runLabel = document.getElementById("run-label");
    const statusLabel = document.getElementById("status-label");
    const reviewBox = document.getElementById("review-box");
    const reviewPreview = document.getElementById("review-preview");
    const reviewInput = document.getElementById("review-input");
    const approveBtn = document.getElementById("approve-btn");
    const replyBtn = document.getElementById("reply-btn");
    const mainComposer = document.getElementById("main-composer");

    let currentRunId = null;
    let eventSource = null;
    let pollTimer = null;

    const ARCH_HELP =
      "PAHS Path A 完整架构（右侧已列出全部节点）：\n\n" +
      "用户输入 → Ingest → Global Rules → Triage → Orchestrator（写 ExecutionPlan）\n" +
      "→ Plan Validate → Env/Budget → Target Rules → Execute Phase（可并行 Task）\n" +
      "→ Search Router（仅 Searcher）→ Verify → 人工审核 → 最终交付 → Learner\n\n" +
      "Telegram 发 IG/视频 走 Path B 直达 SMAS/PIP，不经过此图。";

    function isArchQuery(text) {
      return /^(目前)?架构$|^architecture$|^流程$|^pipeline$/i.test(text.trim());
    }

    function addMessage(role, text) {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderNodes(progress) {
      if (!progress || !Array.isArray(progress.nodes) || progress.nodes.length === 0) {
        progressNodesEl.innerHTML = '<div class="arch-hint">无法加载架构节点</div>';
        return;
      }
      progressNodesEl.innerHTML = "";
      progress.nodes.forEach((node) => {
        const el = document.createElement("div");
        el.className = `node ${node.status || "pending"}`;
        el.innerHTML = `
          <div class="dot"></div>
          <div class="node-label">${node.label_zh || node.label}</div>
          <div class="node-status">${node.status || "pending"}</div>`;
        const layer = document.createElement("div");
        layer.className = "node-layer";
        layer.style.gridColumn = "2 / -1";
        layer.textContent = node.layer || "";
        el.appendChild(layer);
        progressNodesEl.appendChild(el);
      });
    }

    function renderTimeline(progress) {
      if (!progress || !progress.timeline || progress.timeline.length === 0) {
        timelineEl.innerHTML = '<div>事件时间线（运行后出现）</div>';
        return;
      }
      timelineEl.innerHTML = progress.timeline.slice(-14).map((item) =>
        `<div>${(item.created_at || "").slice(11, 19)} ${item.summary || item.event_type}</div>`
      ).join("");
    }

    async function loadArchitecture() {
      try {
        const res = await fetch("/api/architecture");
        if (!res.ok) throw new Error("bad status");
        const data = await res.json();
        renderNodes(data);
        renderTimeline(data);
      } catch (e) {
        progressNodesEl.innerHTML = '<div class="arch-hint">加载失败，请重启 pah dev-ui</div>';
      }
    }

    function setReviewMode(snapshot) {
      const waiting = snapshot && snapshot.waiting_review;
      if (waiting) {
        reviewBox.classList.add("visible");
        mainComposer.style.display = "none";
        reviewPreview.textContent = snapshot.interrupt_message || "(等待审核)";
        statusLabel.textContent = snapshot.review_type || "AWAITING_REVIEW";
      } else {
        reviewBox.classList.remove("visible");
        mainComposer.style.display = "flex";
      }
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function startPolling(runId) {
      stopPolling();
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(`/api/runs/${runId}/progress`);
          if (!res.ok) return;
          const data = await res.json();
          renderNodes(data);
          renderTimeline(data);
          if (data.snapshot) {
            runLabel.textContent = data.snapshot.run_id;
            statusLabel.textContent = data.snapshot.status;
            setReviewMode(data.snapshot);
          }
          const st = data.snapshot && data.snapshot.status;
          if (st === "COMPLETED" || st === "FAILED" || st === "BLOCKED") {
            if (!data.snapshot.waiting_review) {
              stopPolling();
              sendBtn.disabled = false;
            }
          }
        } catch (e) { /* ignore */ }
      }, 500);
    }

    function connectStream(runId) {
      if (eventSource) eventSource.close();
      startPolling(runId);

      eventSource = new EventSource(`/api/runs/${runId}/events/stream`);
      eventSource.onmessage = (ev) => {
        let data;
        try { data = JSON.parse(ev.data); } catch { return; }
        if (data.done) {
          eventSource.close();
          sendBtn.disabled = false;
          return;
        }
        if (data.progress) {
          renderNodes(data.progress);
          renderTimeline(data.progress);
        }
        if (data.snapshot) {
          runLabel.textContent = data.snapshot.run_id;
          statusLabel.textContent = data.snapshot.status;
          setReviewMode(data.snapshot);
          if (data.snapshot.waiting_review && data.snapshot.interrupt_message) {
            const last = messagesEl.lastElementChild;
            if (!last || !last.dataset.review) {
              addMessage("assistant", data.snapshot.interrupt_message);
              messagesEl.lastElementChild.dataset.review = "1";
            }
          }
        }
        (data.events || []).forEach((event) => {
          if (event.event_type === "devlab_run_completed") {
            addMessage("system", "Run completed.");
          }
          if (event.event_type === "devlab_run_failed") {
            addMessage("system", "Run failed: " + ((event.payload && event.payload.error) || "unknown"));
          }
        });
      };
      eventSource.onerror = () => {
        eventSource.close();
        /* polling keeps working */
      };
    }

    async function sendChat() {
      const text = inputEl.value.trim();
      if (!text) return;

      if (isArchQuery(text)) {
        addMessage("user", text);
        addMessage("assistant", ARCH_HELP);
        inputEl.value = "";
        await loadArchitecture();
        return;
      }

      sendBtn.disabled = true;
      addMessage("user", text);
      inputEl.value = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        currentRunId = data.run_id;
        runLabel.textContent = currentRunId;
        statusLabel.textContent = data.status || "ACTIVE";
        addMessage("system", "Run started: " + currentRunId);
        connectStream(currentRunId);
      } catch (e) {
        addMessage("system", "启动失败: " + e.message);
        sendBtn.disabled = false;
      }
    }

    async function sendReply(message) {
      if (!currentRunId) return;
      sendBtn.disabled = true;
      addMessage("user", message);
      await fetch(`/api/runs/${currentRunId}/reply`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      messagesEl.querySelectorAll("[data-review]").forEach((el) => el.removeAttribute("data-review"));
      connectStream(currentRunId);
    }

    sendBtn.addEventListener("click", sendChat);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });
    approveBtn.addEventListener("click", () => sendReply("approved"));
    replyBtn.addEventListener("click", () => {
      const text = reviewInput.value.trim();
      if (text) sendReply(text);
    });

    loadArchitecture();
    addMessage("system", "Dev Lab ready — 右侧为完整架构；输入「架构」查看说明。");
  </script>
</body>
</html>
